# -----------------------------------------------------------------------------
# nginx.conf - [NFR5] Load Balancing simulation
#
# Strategy: least_conn
#   - Forwards each new request to the backend with the fewest active conns.
#   - Rationale: e-commerce traffic is highly skewed (a checkout request is
#     much heavier than a product listing). Pure round_robin can pile heavy
#     requests on the same instance and cause local saturation. least_conn
#     compensates automatically.
#   - Rejected alternative: ip_hash provides sticky sessions, but our sessions
#     live in Redis, so stickiness gives us nothing while it cripples
#     balancing under bursty traffic.
#
# Final tuning (timeouts, max_fails, buffer sizes) is left to the NFR5 owner.
# -----------------------------------------------------------------------------

worker_processes auto;
events { worker_connections 1024; }

http {
    upstream django_backend {
        least_conn;
        server web1:8000 max_fails=3 fail_timeout=10s;
        server web2:8000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;
        server_name _;

        access_log /var/log/nginx/access.log;

        location / {
            proxy_pass http://django_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Surfaces which backend served the request (essential for the
            # NFR5 distribution report).
            proxy_set_header X-Request-Start "t=${msec}";
            add_header X-Served-By $upstream_addr always;
        }

        location /healthz {
            access_log off;
            return 200 "ok\n";
        }
    }
}
