# -----------------------------------------------------------------------------
# nginx.conf - DEMO BEFORE VERSION: no real load distribution
#
# All traffic is intentionally sent to web1 so the before-demo can show
# why multiple backend instances behind least_conn are needed.
# -----------------------------------------------------------------------------

worker_processes auto;
events { worker_connections 1024; }

http {
    upstream django_backend {
        server web1:8000;
    }

    server {
        listen 80;
        server_name _;

        access_log /var/log/nginx/access.log;

        # --- Timeout tuning (NFR5 final values) ---
        proxy_connect_timeout  5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # --- Buffer tuning ---
        proxy_buffer_size        16k;
        proxy_buffers        8 16k;
        proxy_busy_buffers_size 32k;

        location / {
            proxy_pass http://django_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Surfaces which backend served the request (essential for the
            # NFR5 distribution report).
            proxy_set_header X-Request-Start "t=${msec}";
            add_header X-Served-By $upstream_addr always;
        }

        location /healthz {
            access_log off;
            return 200 "ok\n";
        }
    }
}
